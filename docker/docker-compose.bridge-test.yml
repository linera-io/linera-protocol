services:
  # 0. Anvil - local EVM node for LightClient contract
  anvil:
    image: ghcr.io/foundry-rs/foundry:stable
    entrypoint: ["anvil", "--host", "0.0.0.0", "--code-size-limit", "300000", "--hardfork", "cancun", "--slots-in-an-epoch", "1", "--block-time", "1"]
    ports:
      - "${ANVIL_PORT:-8545}:8545"
    healthcheck:
      test: ["CMD-SHELL", "cast chain-id --rpc-url http://localhost:8545 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - linera-network

  # 0b. Foundry tools - persistent service for deploying contracts via forge
  foundry-tools:
    image: "${FOUNDRY_IMAGE:-foundry-jq}"
    pull_policy: if_not_present
    user: root
    entrypoint: ["sleep", "infinity"]
    volumes:
      - bridge-shared:/shared
      - ../linera-bridge/src/solidity:/contracts
    depends_on:
      anvil:
        condition: service_healthy
    networks:
      - linera-network

  # 1. ScyllaDB - storage backend for linera network
  scylla-setup:
    image: ubuntu:24.04
    privileged: true
    volumes:
      - /proc:/host/proc
      - /sys:/host/sys
      - /etc/sysctl.d:/host/sysctl.d
      - ./compose-scylla-setup.sh:/setup.sh:ro
    command: ["/bin/bash", "/setup.sh", "--persist"]
    restart: "no"

  scylla:
    image: scylladb/scylla:6.2.3
    volumes:
      - scylla-data:/var/lib/scylla
    environment:
      SCYLLA_AUTO_CONF: 1
    command:
      - "--developer-mode"
      - "1"
      - "--overprovisioned"
      - "1"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    depends_on:
      scylla-setup:
        condition: service_completed_successfully
    networks:
      - linera-network

  # 2. Network (Validator + Faucet) - initializes storage
  linera-network:
    image: "${LINERA_NETWORK_IMAGE:-linera-test}"
    pull_policy: if_not_present
    ports:
      - "${FAUCET_PORT:-8080}:${FAUCET_PORT:-8080}"
      - "13001:13001"
      - "9090:9090"
      - "${RELAY_METRICS_PORT:-5001}:${RELAY_METRICS_PORT:-5001}"
    command:
      - sh
      - -c
      - |
        mkdir -p ${LINERA_NET_PATH:-/tmp/wallet} &&
        ./linera net \
          --storage scylladb:tcp:scylla:9042:table_default \
          up \
          --path ${LINERA_NET_PATH:-/tmp/wallet} \
          --with-faucet \
          --faucet-port ${FAUCET_PORT:-8080} \
          $${HTTP_REQUEST_ALLOW_LIST:+--http-request-allow-list $$HTTP_REQUEST_ALLOW_LIST}
    environment:
      - RUST_LOG=linera=info
      - FAUCET_PORT=${FAUCET_PORT:-8080}
      - LINERA_NET_PATH=${LINERA_NET_PATH:-/tmp/wallet}
      - HTTP_REQUEST_ALLOW_LIST=${HTTP_REQUEST_ALLOW_LIST:-anvil}
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/'${FAUCET_PORT:-8080}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s
    volumes:
      - network-data:/data
      - bridge-shared:/shared
      - ../examples/target/wasm32-unknown-unknown/release:/wasm/examples:ro
      - ../linera-bridge/contracts/evm-bridge/target/wasm32-unknown-unknown/release:/wasm/root:ro
    depends_on:
      scylla:
        condition: service_healthy
    networks:
      - linera-network

  # 3a. Bridge args init - queries faucet for committee data and outputs constructor args
  bridge-args-init:
    image: "${LINERA_BRIDGE_IMAGE:-linera-bridge}"
    pull_policy: if_not_present
    command:
      - sh
      - -c
      - |
        echo "Querying committee data from faucet..."
        exec linera-bridge init-light-client \
          --faucet-url http://linera-network:${FAUCET_PORT:-8080} \
          --pause-guardian "${LIGHT_CLIENT_PAUSE_GUARDIAN:-0x000000000000000000000000000000000000dEaD}" \
          --proposer "${LIGHT_CLIENT_PROPOSER:-0x000000000000000000000000000000000000bEEF}" \
          --output /shared/light-client-args.json
    volumes:
      - bridge-shared:/shared
    depends_on:
      linera-network:
        condition: service_healthy
    networks:
      - linera-network

  # 3b. Bridge init - deploys LightClient contract to Anvil via forge script
  bridge-init:
    image: "${FOUNDRY_IMAGE:-foundry-jq}"
    pull_policy: if_not_present
    user: root
    entrypoint: ["sh", "-c"]
    command:
      - |
        # -e: abort on any failed command; -u: abort on unset var.
        # (This runs under dash/`sh`, which lacks `set -o pipefail`, so the forge
        # deploy below is NOT piped — its exit code reaches `set -e` directly.
        # Without this, a failed deploy (e.g. a contract over the EIP-170 size
        # limit) was silently swallowed, leaving a stale
        # /shared/light-client-address and a bridge wired to a non-existent
        # light client.)
        set -eu
        echo "Waiting for Anvil to be ready..."
        until cast chain-id --rpc-url http://anvil:8545 2>/dev/null; do
          sleep 1
        done

        echo "Waiting for constructor args..."
        while [ ! -f /shared/light-client-args.json ]; do
          sleep 1
        done

        echo "Deploying LightClient via forge script..."
        VERIFY_ARGS=""
        if [ -n "$$EXPLORER_API_KEY" ] && [ -n "$$VERIFIER_URL" ]; then
            VERIFY_ARGS="--verify --etherscan-api-key $$EXPLORER_API_KEY --verifier-url $$VERIFIER_URL"
        fi
        # Not piped (no `| tee`) so forge's exit code reaches `set -e` directly
        # under dash; and no `|| { ...; exit 1; }` masking (which would itself
        # re-suppress -e). forge output still streams to the container log.
        LIGHT_CLIENT_ARGS_JSON_FILE=/shared/light-client-args.json \
          forge script /contracts/script/DeployLightClient.s.sol \
          --root /contracts \
          --rpc-url http://anvil:8545 \
          --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 \
          --broadcast \
          $$VERIFY_ARGS \
          2>&1

        # The script deploys a single contract via vm.broadcast(), so
        # transactions[0] is the LightClient creation.
        CHAIN_ID=$$(cast chain-id --rpc-url http://anvil:8545)
        CONTRACT_ADDRESS=$$(jq -r '.transactions[0].contractAddress' \
          /contracts/broadcast/DeployLightClient.s.sol/$$CHAIN_ID/run-latest.json)

        # Validate before publishing the address: forge can print/record a
        # CREATE address from simulation even when the broadcast never lands
        # (the failure mode that wired the bridge to the token). Require a
        # well-formed, non-zero address with actual code on-chain.
        case "$$CONTRACT_ADDRESS" in
          0x*) : ;;
          *) echo "ERROR: LightClient address not 0x-prefixed: '$$CONTRACT_ADDRESS'" >&2; exit 1 ;;
        esac
        if [ $${#CONTRACT_ADDRESS} -ne 42 ]; then
          echo "ERROR: LightClient address wrong length: '$$CONTRACT_ADDRESS'" >&2; exit 1
        fi
        if [ "$$CONTRACT_ADDRESS" = "0x0000000000000000000000000000000000000000" ]; then
          echo "ERROR: LightClient address is zero" >&2; exit 1
        fi
        CODE=$$(cast code "$$CONTRACT_ADDRESS" --rpc-url http://anvil:8545)
        if [ -z "$$CODE" ] || [ "$$CODE" = "0x" ]; then
          echo "ERROR: no contract code at LightClient $$CONTRACT_ADDRESS — deploy did not land" >&2
          exit 1
        fi

        echo "LightClient deployed at: $$CONTRACT_ADDRESS"
        echo "$$CONTRACT_ADDRESS" > /shared/light-client-address
    environment:
      # Optional: setting both publishes the verified contract source to an
      # explorer atomically with the deploy. Local-dev (anvil) leaves them
      # unset; --verify is omitted.
      - EXPLORER_API_KEY=${EXPLORER_API_KEY:-}
      - VERIFIER_URL=${VERIFIER_URL:-}
    volumes:
      - bridge-shared:/shared
      - ../linera-bridge/src/solidity:/contracts
    depends_on:
      anvil:
        condition: service_healthy
      bridge-args-init:
        condition: service_completed_successfully
    networks:
      - linera-network

  # 4a. Bridge chain init - claims a chain for the relay before the relay starts.
  #     Writes bridge-chain-id and relay-owner to /shared/ so the setup script
  #     and the relay can use them.
  bridge-chain-init:
    image: "${LINERA_NETWORK_IMAGE:-linera-test}"
    pull_policy: if_not_present
    network_mode: "service:linera-network"
    command:
      - sh
      - -c
      - |
        set -e
        FAUCET=http://localhost:${FAUCET_PORT:-8080}
        RELAY_WALLET=/shared/relay-wallet

        echo "Initializing relay wallet..."
        mkdir -p $$RELAY_WALLET
        LINERA_WALLET=$$RELAY_WALLET/wallet.json \
        LINERA_KEYSTORE=$$RELAY_WALLET/keystore.json \
        LINERA_STORAGE=rocksdb:$$RELAY_WALLET/client.db \
          ./linera wallet init --faucet "$$FAUCET"

        echo "Claiming bridge chain..."
        OUTPUT=$$(LINERA_WALLET=$$RELAY_WALLET/wallet.json \
        LINERA_KEYSTORE=$$RELAY_WALLET/keystore.json \
        LINERA_STORAGE=rocksdb:$$RELAY_WALLET/client.db \
          ./linera wallet request-chain --faucet "$$FAUCET" 2>&1)
        echo "$$OUTPUT"

        # Extract chain ID (64-char hex on its own line)
        CHAIN_ID=$$(echo "$$OUTPUT" | grep -oE '^[a-f0-9]{64}$$' | tail -1)
        # Extract owner (the AccountOwner printed by request-chain)
        OWNER=$$(echo "$$OUTPUT" | grep -oE '0x[a-f0-9]{64}' | tail -1)

        echo "Bridge chain: $$CHAIN_ID"
        echo "Relay owner:  $$OWNER"
        echo "$$CHAIN_ID" > /shared/bridge-chain-id
        echo "$$OWNER" > /shared/relay-owner
    environment:
      - FAUCET_PORT=${FAUCET_PORT:-8080}
    volumes:
      - bridge-shared:/shared
    depends_on:
      linera-network:
        condition: service_healthy

  # 4b. Relay server - processes inbox, forwards blocks to EVM.
  #     Uses the chain claimed by bridge-chain-init.
  #     Bridge address is resolved from /shared/bridge-address (written by setup script).
  # Uses network_mode: service:linera-network so that localhost:13001 reaches the
  # validator (whose address is hardcoded as "localhost" in the genesis config).
  linera-relay:
    image: "${LINERA_BRIDGE_IMAGE:-linera-bridge}"
    pull_policy: if_not_present
    network_mode: "service:linera-network"
    entrypoint: ["sh", "-c"]
    command:
      - |
        # The setup script clears /shared/setup-complete at the start of each
        # run, so we only wait here — never delete it. This lets the relay
        # restart standalone (reusing the marker) instead of hanging until the
        # next full setup run.
        echo "Waiting for setup to complete..."
        while [ ! -f /shared/setup-complete ]; do sleep 1; done

        export RPC_URL=http://anvil:8545
        export FAUCET_URL=http://localhost:${FAUCET_PORT:-8080}
        export EVM_BRIDGE_ADDRESS=$$(cat /shared/bridge-address | tr -d '[:space:]')
        export LINERA_BRIDGE_APP=$$(cat /shared/bridge-app-id | tr -d '[:space:]')
        export LINERA_FUNGIBLE_APP=$$(cat /shared/wrapped-app-id | tr -d '[:space:]')
        export LINERA_BRIDGE_CHAIN_ID=$$(cat /shared/bridge-chain-id | tr -d '[:space:]')
        export LINERA_BRIDGE_CHAIN_OWNER=$$(cat /shared/relay-owner | tr -d '[:space:]')
        export EVM_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
        export LINERA_WALLET=/shared/relay-wallet/wallet.json
        export LINERA_KEYSTORE=/shared/relay-wallet/keystore.json
        export LINERA_STORAGE=rocksdb:/shared/relay-wallet/client.db

        echo "Starting relay: chain=$$LINERA_BRIDGE_CHAIN_ID bridge=$$EVM_BRIDGE_ADDRESS"
        exec bridge-entrypoint.sh serve
    environment:
      - RUST_LOG=linera=info,linera_bridge=debug
      - PORT=${RELAY_METRICS_PORT:-5001}
      - MONITOR_SCAN_INTERVAL=${MONITOR_SCAN_INTERVAL:-5}
      - MONITOR_START_BLOCK=${MONITOR_START_BLOCK:-0}
      - MAX_RETRIES=${MAX_RETRIES:-10}
      # Anvil is reached via the non-loopback host `anvil`, which alloy treats as
      # remote (7s receipt poll). Match anvil's ~1s block time so settlement is
      # fast locally.
      - EVM_POLL_INTERVAL_MS=${EVM_POLL_INTERVAL_MS:-200}
    volumes:
      - bridge-shared:/shared
    depends_on:
      bridge-chain-init:
        condition: service_completed_successfully
      anvil:
        condition: service_healthy

volumes:
  scylla-data:
    driver: local
  network-data:
    driver: local
  bridge-shared:
    driver: local

networks:
  linera-network:
    driver: bridge
