services:
  web:
    image: ${CADDY_IMAGE:-caddy:2.10.2-alpine}
    container_name: web
    restart: unless-stopped
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
      - "${WEB_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    deploy:
      resources:
        limits:
          cpus: "${LIMIT_CPUS_WEB:-1.00}"
          memory: ${LIMIT_MEM_WEB:-1536M}

  scylla-setup:
    image: ubuntu:24.04
    container_name: scylla-setup
    privileged: true
    volumes:
      - /proc:/host/proc
      - /sys:/host/sys
      - /etc/sysctl.d:/host/sysctl.d
      - ./compose-scylla-setup.sh:/setup.sh:ro
    command: ["/bin/bash", "/setup.sh", "--persist"]
    restart: "no"

  scylla:
    image: ${SCYLLA_IMAGE:-scylladb/scylla:6.2.3}
    container_name: scylla
    restart: unless-stopped
    volumes:
      - linera-scylla-data:/var/lib/scylla
    environment:
      SCYLLA_AUTO_CONF: 1
    command:
      - "--developer-mode"
      - "${SCYLLA_DEVELOPER_MODE:-0}"
      - "--overprovisioned"
      - "${SCYLLA_OVERPROVISIONED:-1}"
      # NOTE: Uncomment --smp for optimal performance on fresh deployments.
      # Uses the same value as LIMIT_CPUS_SCYLLA so shard count matches CPU limit.
      # NOT safe on existing data — ScyllaDB tablets don't support reducing shards.
      # - "--smp"
      # - "${LIMIT_CPUS_SCYLLA:-2}"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: ${SCYLLA_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${SCYLLA_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${SCYLLA_HEALTHCHECK_RETRIES:-20}
      start_period: ${SCYLLA_HEALTHCHECK_START_PERIOD:-60s}
    depends_on:
      scylla-setup:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "${LIMIT_CPUS_SCYLLA:-2.00}"
          memory: ${LIMIT_MEM_SCYLLA:-10G}

  proxy:
    image: "${LINERA_IMAGE:-us-docker.pkg.dev/linera-io-dev/linera-public-registry/linera:testnet_conway_release}"
    container_name: proxy
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-19100}:19100"
    command:
      - ./linera-proxy
      - --storage
      - scylladb:tcp:scylla:${SCYLLA_PORT:-9042}
      - --storage-replication-factor
      - "${STORAGE_REPLICATION_FACTOR:-1}"
      - /config/server.json
    volumes:
      - .:/config
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/21100' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      shard-init:
        condition: service_completed_successfully
      scylla:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${LIMIT_CPUS_PROXY:-1.00}"
          memory: ${LIMIT_MEM_PROXY:-512M}

  # Each shard must run with a unique --shard number matching the server.json configuration.
  # Docker Compose replicas don't support per-replica arguments, so we define separate services.
  # Per-shard resource limits: LIMIT_CPUS_SHARD_N / LIMIT_MEM_SHARD_N (N=0..3).
  shard-0:
    image: "${LINERA_IMAGE:-us-docker.pkg.dev/linera-io-dev/linera-public-registry/linera:testnet_conway_release}"
    container_name: docker-shard-1
    hostname: docker-shard-1
    restart: unless-stopped
    command:
      - ./linera-server
      - run
      - --storage
      - scylladb:tcp:scylla:${SCYLLA_PORT:-9042}
      - --server
      - /config/server.json
      - --shard
      - "0"
      - --storage-replication-factor
      - "${STORAGE_REPLICATION_FACTOR:-1}"
      - --execution-state-cache-size
      - "${LINERA_EXECUTION_STATE_CACHE_SIZE:-5000}"
      - --block-cache-size
      - "${LINERA_BLOCK_CACHE_SIZE:-2500}"
    volumes:
      - .:/config
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    depends_on:
      shard-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "${LIMIT_CPUS_SHARD_0:-1.50}"
          memory: ${LIMIT_MEM_SHARD_0:-2560M}

  shard-1:
    image: "${LINERA_IMAGE:-us-docker.pkg.dev/linera-io-dev/linera-public-registry/linera:testnet_conway_release}"
    container_name: docker-shard-2
    hostname: docker-shard-2
    restart: unless-stopped
    command:
      - ./linera-server
      - run
      - --storage
      - scylladb:tcp:scylla:${SCYLLA_PORT:-9042}
      - --server
      - /config/server.json
      - --shard
      - "1"
      - --storage-replication-factor
      - "${STORAGE_REPLICATION_FACTOR:-1}"
      - --execution-state-cache-size
      - "${LINERA_EXECUTION_STATE_CACHE_SIZE:-5000}"
      - --block-cache-size
      - "${LINERA_BLOCK_CACHE_SIZE:-2500}"
    volumes:
      - .:/config
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    depends_on:
      shard-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "${LIMIT_CPUS_SHARD_1:-1.50}"
          memory: ${LIMIT_MEM_SHARD_1:-2560M}

  shard-2:
    image: "${LINERA_IMAGE:-us-docker.pkg.dev/linera-io-dev/linera-public-registry/linera:testnet_conway_release}"
    container_name: docker-shard-3
    hostname: docker-shard-3
    restart: unless-stopped
    command:
      - ./linera-server
      - run
      - --storage
      - scylladb:tcp:scylla:${SCYLLA_PORT:-9042}
      - --server
      - /config/server.json
      - --shard
      - "2"
      - --storage-replication-factor
      - "${STORAGE_REPLICATION_FACTOR:-1}"
      - --execution-state-cache-size
      - "${LINERA_EXECUTION_STATE_CACHE_SIZE:-5000}"
      - --block-cache-size
      - "${LINERA_BLOCK_CACHE_SIZE:-2500}"
    volumes:
      - .:/config
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    depends_on:
      shard-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "${LIMIT_CPUS_SHARD_2:-1.50}"
          memory: ${LIMIT_MEM_SHARD_2:-2560M}

  shard-3:
    image: "${LINERA_IMAGE:-us-docker.pkg.dev/linera-io-dev/linera-public-registry/linera:testnet_conway_release}"
    container_name: docker-shard-4
    hostname: docker-shard-4
    restart: unless-stopped
    command:
      - ./linera-server
      - run
      - --storage
      - scylladb:tcp:scylla:${SCYLLA_PORT:-9042}
      - --server
      - /config/server.json
      - --shard
      - "3"
      - --storage-replication-factor
      - "${STORAGE_REPLICATION_FACTOR:-1}"
      - --execution-state-cache-size
      - "${LINERA_EXECUTION_STATE_CACHE_SIZE:-5000}"
      - --block-cache-size
      - "${LINERA_BLOCK_CACHE_SIZE:-2500}"
    volumes:
      - .:/config
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    depends_on:
      shard-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "${LIMIT_CPUS_SHARD_3:-1.50}"
          memory: ${LIMIT_MEM_SHARD_3:-2560M}

  shard-init:
    image: "${LINERA_IMAGE:-us-docker.pkg.dev/linera-io-dev/linera-public-registry/linera:testnet_conway_release}"
    container_name: shard-init
    environment:
      - SCYLLA_PORT=${SCYLLA_PORT:-9042}
    command:
      - sh
      - -c
      - |
        while true; do
          ./linera storage check-existence --storage scylladb:tcp:scylla:$${SCYLLA_PORT}
          status=$$?
          if [ $$status -eq 0 ]; then
            echo "Database already exists, no need to initialize."
            exit 0
          elif [ $$status -eq 1 ]; then
            echo "Database does not exist, attempting to initialize..."
            if ./linera storage initialize --storage scylladb:tcp:scylla:$${SCYLLA_PORT} --genesis /config/genesis.json; then
              echo "Initialization successful."
              exit 0
            else
              echo "Initialization failed, retrying in 5 seconds..."
              sleep 5
            fi
          else
            echo "An unexpected error occurred (status: $$status), retrying in 5 seconds..."
            sleep 5
          fi
        done
    volumes:
      - .:/config
    depends_on:
      scylla-setup:
        condition: service_completed_successfully
      scylla:
        condition: service_started

  watchtower:
    image: ${WATCHTOWER_IMAGE:-nickfedor/watchtower:1.15.0}
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["--interval", "${WATCHTOWER_INTERVAL:-30}"]
    deploy:
      resources:
        limits:
          cpus: "${LIMIT_CPUS_WATCHTOWER:-0.25}"
          memory: ${LIMIT_MEM_WATCHTOWER:-256M}

volumes:
  linera-scylla-data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
