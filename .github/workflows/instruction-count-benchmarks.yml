# NOTE: post-benchmark-comment.yml references this workflow by name.
# If you rename it, update the workflow_run trigger there too.
name: Instruction Count Benchmarks

on:
  push:
    branches: [main, 'devnet_*', 'testnet_*']
  pull_request:
    branches:
      - "**"
    paths:
      - 'linera-views/**'
      - 'linera-views-derive/**'
      - '.github/workflows/instruction-count-benchmarks.yml'
      - '.github/scripts/format-bench-results.sh'
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.run_id }}'
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10

permissions:
  contents: read
  actions: read

jobs:
  save-baseline:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: linera-io-self-hosted-ci
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
    - uses: actions-rust-lang/setup-rust-toolchain@v1
    - name: Install Protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Install Valgrind
      run: sudo apt-get update && sudo apt-get install -y valgrind
    - name: Install gungraun-runner
      run: cargo install gungraun-runner --version 0.17.2
    - name: Build benchmarks
      run: cargo bench -p linera-views --bench gungraun_views --no-run
    - name: Run benchmarks and save baseline
      run: cargo bench -p linera-views --bench gungraun_views -- --save-baseline=main
    - name: Upload baseline artifact
      uses: actions/upload-artifact@v4
      with:
        name: gungraun-baseline-${{ github.ref_name }}-${{ github.sha }}
        path: target/gungraun
        retention-days: 14

  compare:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: linera-io-self-hosted-ci
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions-rust-lang/setup-rust-toolchain@v1
    - name: Install Protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Install Valgrind
      run: sudo apt-get update && sudo apt-get install -y valgrind
    - name: Install gungraun-runner
      run: cargo install gungraun-runner --version 0.17.2
    - name: Build benchmarks
      run: cargo bench -p linera-views --bench gungraun_views --no-run
    - name: Download baseline artifact
      id: download-baseline
      run: |
        BASE_REF="${{ github.event.pull_request.base.ref || 'main' }}"
        # For stacked PRs (e.g. via Graphite), the base ref is another feature
        # branch that may not exist as a remote. Fall back to main.
        if ! git rev-parse "origin/$BASE_REF" >/dev/null 2>&1; then
          echo "Base ref origin/$BASE_REF not found, falling back to main"
          BASE_REF="main"
        fi
        MERGE_BASE=$(git merge-base HEAD "origin/$BASE_REF")
        MERGE_BASE_DATE=$(git log -1 --format=%aI "$MERGE_BASE")
        echo "Merge base: $MERGE_BASE (date: $MERGE_BASE_DATE)"
        echo "Base branch: $BASE_REF"

        # Find the most recent baseline artifact for this branch created on or before
        # the merge base date. Artifacts are branch-scoped to avoid cross-branch comparisons.
        ARTIFACT_PREFIX="gungraun-baseline-${BASE_REF}-"
        ARTIFACT=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
          --jq "[.artifacts[] | select(.name | startswith(\"$ARTIFACT_PREFIX\")) | select(.expired == false) | select(.created_at <= \"$MERGE_BASE_DATE\")] | first // empty")

        if [ -n "$ARTIFACT" ] && [ "$ARTIFACT" != "null" ]; then
          ARTIFACT_URL=$(echo "$ARTIFACT" | jq -r '.archive_download_url')
          ARTIFACT_SHA=$(echo "$ARTIFACT" | jq -r ".name | ltrimstr(\"$ARTIFACT_PREFIX\")")
          echo "Using baseline from commit $ARTIFACT_SHA"
          gh api "$ARTIFACT_URL" > /tmp/baseline.zip
          mkdir -p target/gungraun
          unzip -o /tmp/baseline.zip -d target/gungraun
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "baseline_sha=$ARTIFACT_SHA" >> "$GITHUB_OUTPUT"
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
          echo "No baseline found for $BASE_REF on or before merge base $MERGE_BASE. Please rebase onto $BASE_REF."
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Collect cache info
      id: cache-info
      run: |
        CACHE_INFO=$(lscpu | grep -E '^L[123]' | paste -sd '; ' -)
        echo "cache_info=$CACHE_INFO" >> "$GITHUB_OUTPUT"
    - name: Run benchmarks and compare
      id: bench
      run: |
        if [ "$BASELINE_FOUND" = "true" ]; then
          cargo bench -p linera-views --bench gungraun_views -- --baseline=main \
            --save-summary=json || true
        else
          echo "No baseline found, running without comparison"
          cargo bench -p linera-views --bench gungraun_views -- --save-baseline=main \
            --save-summary=json
        fi
      env:
        BASELINE_FOUND: ${{ steps.download-baseline.outputs.found }}
    - name: Format benchmark results
      if: github.event_name == 'pull_request' && always()
      run: |
        ARGS=(target/gungraun)
        [ -n "$BASELINE_SHA" ] && ARGS+=(--baseline-sha "$BASELINE_SHA")
        [ -n "$CACHE_INFO" ] && ARGS+=(--cache-info "$CACHE_INFO")
        bash .github/scripts/format-bench-results.sh "${ARGS[@]}" > /tmp/bench-comment.md
      env:
        BASELINE_SHA: ${{ steps.download-baseline.outputs.baseline_sha }}
        CACHE_INFO: ${{ steps.cache-info.outputs.cache_info }}
    - name: Save PR number
      if: github.event_name == 'pull_request' && always()
      run: echo "$PR_NUMBER" > /tmp/pr-number.txt
      env:
        PR_NUMBER: ${{ github.event.pull_request.number }}
    - name: Upload benchmark comment
      if: github.event_name == 'pull_request' && always()
      uses: actions/upload-artifact@v4
      with:
        name: bench-comment
        path: |
          /tmp/bench-comment.md
          /tmp/pr-number.txt
        retention-days: 1
