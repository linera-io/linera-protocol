name: Bridge E2E

on:
  merge_group:
  workflow_dispatch:
  push:
    branches: [ 'testnet_*', 'main', 'bridge-main']

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.run_id }}'
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 10
  RUST_LOG: warn
  GCP_REGISTRY: us-docker.pkg.dev/linera-io-dev/linera-public-registry

permissions:
  contents: read
  id-token: write

jobs:
  bridge-e2e:
    runs-on: linera-io-self-hosted-ci
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Protoc
        uses: ./.github/actions/install-protoc

      # Self-hosted runners occasionally expose an unhealthy
      # docker socket at job start despite
      # RUNNER_WAIT_FOR_DOCKER_IN_SECONDS. Probe + retry so
      # we do not fail the whole run on a startup race.
      - name: Wait for docker daemon
        run: |
          for i in $(seq 1 60); do
            if docker info >/dev/null 2>&1; then
              echo "Docker ready after ${i} attempt(s)"
              exit 0
            fi
            echo "Waiting for docker daemon ($i/60)..."
            sleep 2
          done
          echo "Docker daemon did not become ready in 120s"
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Pull pre-built linera images from GCP registry
      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: >-
            projects/886017272224/locations/global/workloadIdentityPools/github-apps-pool/providers/github-apps-provider
          service_account: >-
            actions-runner@linera-io-dev.iam.gserviceaccount.com

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker us-docker.pkg.dev

      - name: Pull linera & exporter images
        id: pull-images
        continue-on-error: true
        run: |
          BRANCH="${{ github.base_ref || github.ref_name }}"
          docker pull "${GCP_REGISTRY}/linera:${BRANCH}"
          docker pull "${GCP_REGISTRY}/linera-exporter:${BRANCH}"
          docker tag "${GCP_REGISTRY}/linera:${BRANCH}" linera-test
          docker tag "${GCP_REGISTRY}/linera-exporter:${BRANCH}" linera-exporter

      - name: Build linera image
        if: steps.pull-images.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          tags: linera-test
          load: true
          build-args: |
            build_flag=
            build_folder=debug

      - name: Build exporter image
        if: steps.pull-images.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.exporter
          tags: linera-exporter
          load: true
          build-args: |
            build_flag=
            build_folder=debug

      - name: Build foundry-jq image
        run: docker build -t foundry-jq -f ./docker/Dockerfile.foundry ./docker

      - name: Check if bridge source changed
        id: bridge-check
        run: |
          BASE="${{ github.base_ref }}"
          if [ -n "$BASE" ]; then
            BASE="origin/$BASE"
          else
            BASE="HEAD~1"
          fi
          CHANGED=$(git diff --name-only "$BASE" -- \
            linera-bridge/ docker/Dockerfile.bridge \
            ':!linera-bridge/tests/e2e' | head -1)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull bridge image
        id: pull-bridge
        if: steps.bridge-check.outputs.changed == 'false'
        continue-on-error: true
        run: |
          BRANCH="${{ github.base_ref || github.ref_name }}"
          docker pull "${GCP_REGISTRY}/linera-bridge:${BRANCH}"
          docker tag "${GCP_REGISTRY}/linera-bridge:${BRANCH}" linera-bridge:latest

      - name: Build bridge image
        id: build-bridge
        if: steps.bridge-check.outputs.changed == 'true' || steps.pull-bridge.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.bridge
          load: true
          tags: |
            linera-bridge:latest
            ${{ github.event_name != 'workflow_dispatch' && format('{0}/linera-bridge:{1}', env.GCP_REGISTRY, github.base_ref || github.ref_name) || '' }}

      - name: Push bridge image to registry
        if: steps.build-bridge.outcome == 'success' && github.event_name != 'workflow_dispatch'
        run: |
          BRANCH="${{ github.base_ref || github.ref_name }}"
          docker push "${GCP_REGISTRY}/linera-bridge:${BRANCH}"

      - name: Build example Wasm modules for bridge tests
        run: cargo build --release --target wasm32-unknown-unknown -p wrapped-fungible -p evm-bridge
        working-directory: examples

      - name: Build linera-bridge binary for local relay tests
        run: cargo build -p linera-bridge --features linera-bridge/relay

      - name: Run bridge E2E test
        working-directory: linera-bridge/tests/e2e
        env:
          RUSTFLAGS: ""
        run: cargo test -- --ignored --nocapture
