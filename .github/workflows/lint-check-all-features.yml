name: Lint check all features

on:
  push:
    branches: [ 'devnet_*', 'testnet_*' ]
  pull_request:
  merge_group:
  workflow_dispatch:

# This allows a subsequently queued workflow run to interrupt previous runs on pull requests
concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.run_id }}'
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  # We allow redundant explicit links because `cargo rdme` doesn't know how to resolve implicit intra-crate links.
  RUSTDOCFLAGS: -A rustdoc::redundant_explicit_links -D warnings
  RUSTFLAGS: -D warnings --cfg=web_sys_unstable_apis
  RUSTUP_MAX_RETRIES: 10
  RUST_LOG: warn

permissions:
  contents: read

jobs:
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.files-changed.outputs.paths }}
    steps:
      - uses: actions/checkout@v4
      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: files-changed
        with:
          predicate-quantifier: 'every'
          filters: |
            paths:
              - '!docker/**'
              - '!configuration/**'
              - '!kubernetes/**'
              - '!docs/**'
              - '!mdbook/**'
              - '!CONTRIBUTING.md'
              - '!INSTALL.md'
              - '!README.md'

  check-all-features-partition:
    needs: changed-files
    if: github.event_name != 'pull_request' && needs.changed-files.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4, 5, 6]

    steps:
    - uses: actions/checkout@v4
    - name: Put lint toolchain file in place
      run: |
        ln -sf toolchains/nightly/rust-toolchain.toml
    - uses: actions-rust-lang/setup-rust-toolchain@v1
    - uses: taiki-e/install-action@cargo-hack
    - name: Install Protoc
      uses: arduino/setup-protoc@v3
      with:
        version: "34.1"
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Run cargo hack check (partition ${{ matrix.partition }}/6)
      run: |
        cargo hack check --each-feature --workspace --all-targets --partition ${{ matrix.partition }}/6

  lint-check-all-features:
    needs: check-all-features-partition
    runs-on: ubuntu-latest
    if: always()
    steps:
    - run: |
        result="${{ needs.check-all-features-partition.result }}"
        if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
          exit 1
        fi
