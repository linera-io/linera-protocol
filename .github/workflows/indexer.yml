name: Indexer Tests

on:
  pull_request:
    branches:
      - "**"
  merge_group:
  workflow_dispatch:

# This allows a subsequently queued workflow run to interrupt previous runs on pull requests
concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.run_id }}'
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: full
  RUSTDOCFLAGS: -A rustdoc::redundant_explicit_links -D warnings
  RUSTFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 10

permissions:
  contents: read

jobs:
  # paths-ignore within a pull_request doesn't work well with merge_group, so we need to use a custom filter.
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.files-changed.outputs.paths }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Filter paths
        uses: dorny/paths-filter@v4.0.1
        id: files-changed
        with:
          predicate-quantifier: 'every'
          filters: |
            paths:
              - '!docker/**'
              - '!configuration/**'
              - '!kubernetes/**'
              - '!docs/**'
              - '!mdbook/**'
              - '!CONTRIBUTING.md'
              - '!INSTALL.md'
              - '!README.md'
              # Workflow-only PRs don't need heavy code tests; merge to main
              # validates the workflow itself by running it for real.
              - '!.github/workflows/**'

  indexer-check:
    needs: changed-files
    if: needs.changed-files.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v6.0.2
    - uses: actions-rust-lang/setup-rust-toolchain@v1
    - name: Install Protoc
      uses: ./.github/actions/install-protoc
    - name: Check indexer library compiles
      run: |
        cargo check --locked -p linera-indexer
    - name: Check indexer example compiles
      run: |
        cargo check --locked -p linera-indexer-example
    - name: Run indexer unit tests
      run: |
        cargo test --locked -p linera-indexer --lib -- --skip db::postgres

  indexer-integration-tests:
    if: github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v6.0.2
    - uses: actions-rust-lang/setup-rust-toolchain@v1
    - name: Install Protoc
      uses: ./.github/actions/install-protoc
    - name: Run indexer integration tests
      run: |
        cargo test --locked -p linera-indexer --lib
