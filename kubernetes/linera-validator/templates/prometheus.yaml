apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    release: linera-core
  name: shards
spec:
  endpoints:
    - port: metrics
      path: /metrics
      scheme: http
      relabelings:
        - targetLabel: job
          replacement: linera-linera-server
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: shards
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    release: linera-core
  name: proxy
spec:
  endpoints:
    - port: metrics
      path: /metrics
      scheme: http
      relabelings:
        - targetLabel: job
          replacement: linera-linera-proxy
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: proxy
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gce-pd-balanced
provisioner: kubernetes.io/gce-pd
parameters:
  type: pd-balanced
reclaimPolicy: Retain
allowVolumeExpansion: true
