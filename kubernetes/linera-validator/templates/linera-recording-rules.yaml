apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: linera-recording-rules
  namespace: default
  labels:
    release: linera-core
spec:
  groups:
  - name: linera.execution.rules
    rules:
    # Block execution latencies
    - record: linera:block_execution_latency:rate1m
      expr: sum(rate(linera_block_execution_latency_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:operation_execution_latency:rate1m
      expr: sum(rate(linera_operation_execution_latency_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:message_execution_latency:rate1m
      expr: sum(rate(linera_message_execution_latency_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:bytecode_decompression_latency:rate1m
      expr: sum(rate(linera_bytecode_decompression_latency_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:state_hash_computation_latency:rate1m
      expr: sum(rate(linera_state_hash_computation_latency_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:cross_chain_queue_wait_time:rate1m
      expr: sum(rate(linera_cross_chain_queue_wait_time_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:chain_worker_request_queue_wait_time:rate1m
      expr: sum(rate(linera_chain_worker_request_queue_wait_time_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:create_network_actions_latency:rate1m
      expr: sum(rate(linera_create_network_actions_latency_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    # Per-block distributions
    - record: linera:num_inboxes:rate1m
      expr: sum(rate(linera_num_inboxes_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:num_outboxes:rate1m
      expr: sum(rate(linera_num_outboxes_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:inbox_size:rate1m
      expr: sum(rate(linera_inbox_size_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:outbox_size:rate1m
      expr: sum(rate(linera_outbox_size_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:removed_bundles:rate1m
      expr: sum(rate(linera_removed_bundles_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    # Rounds (extra dimensions)
    - record: linera:num_rounds_in_block_proposal:rate1m
      expr: sum(rate(linera_num_rounds_in_block_proposal_bucket{job="linera-linera-server"}[1m])) by (le, validator, round_type)
    - record: linera:num_rounds_in_certificate:rate1m
      expr: sum(rate(linera_num_rounds_in_certificate_bucket{job="linera-linera-server"}[1m])) by (le, validator, certificate_value, round_type)
    # Block composition
    - record: linera:transactions_per_block:rate1m
      expr: sum(rate(linera_transactions_per_block_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:operations_per_block:rate1m
      expr: sum(rate(linera_operations_per_block_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:incoming_bundles_per_block:rate1m
      expr: sum(rate(linera_incoming_bundles_per_block_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    # Wasm performance
    - record: linera:wasm_contract_instantiation_latency:rate1m
      expr: sum(rate(linera_wasm_contract_instantiation_latency_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:wasm_service_instantiation_latency:rate1m
      expr: sum(rate(linera_wasm_service_instantiation_latency_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:wasm_fuel_used_per_block:rate1m
      expr: sum(rate(linera_wasm_fuel_used_per_block_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:wasm_num_reads_per_block:rate1m
      expr: sum(rate(linera_wasm_num_reads_per_block_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:wasm_bytes_read_per_block:rate1m
      expr: sum(rate(linera_wasm_bytes_read_per_block_bucket{job="linera-linera-server"}[1m])) by (le, validator)
    - record: linera:wasm_bytes_written_per_block:rate1m
      expr: sum(rate(linera_wasm_bytes_written_per_block_bucket{job="linera-linera-server"}[1m])) by (le, validator)

  - name: linera.request.rules
    rules:
    - record: linera:proxy_request_latency:rate1m
      expr: sum(rate(linera_proxy_request_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:server_request_latency:rate1m
      expr: sum(rate(linera_server_request_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:server_request_latency_per_request_type:rate1m
      expr: sum(rate(linera_server_request_latency_per_request_type_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator, method_name)

  - name: linera.storage.rules
    rules:
    # High-level storage ops (server+proxy)
    - record: linera:load_chain_latency:rate1m
      expr: sum(rate(linera_load_chain_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:load_contract_latency:rate1m
      expr: sum(rate(linera_load_contract_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:load_service_latency:rate1m
      expr: sum(rate(linera_load_service_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:read_certificate_latency:rate1m
      expr: sum(rate(linera_read_certificate_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:read_blob_latency:rate1m
      expr: sum(rate(linera_read_blob_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:write_blob_latency:rate1m
      expr: sum(rate(linera_write_blob_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:read_event_latency:rate1m
      expr: sum(rate(linera_read_event_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:write_event_latency:rate1m
      expr: sum(rate(linera_write_event_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:write_batch_latency:rate1m
      expr: sum(rate(linera_write_batch_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:contains_certificate_latency:rate1m
      expr: sum(rate(linera_contains_certificate_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:contains_blob_latency:rate1m
      expr: sum(rate(linera_contains_blob_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:contains_event_latency:rate1m
      expr: sum(rate(linera_contains_event_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    # ScyllaDB internal (server+proxy)
    - record: linera:journaling_scylladb_internal_write_batch_latency:rate1m
      expr: sum(rate(linera_journaling_scylladb_internal_write_batch_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:journaling_scylladb_internal_read_value_bytes_latency:rate1m
      expr: sum(rate(linera_journaling_scylladb_internal_read_value_bytes_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:journaling_scylladb_internal_contains_key_latency:rate1m
      expr: sum(rate(linera_journaling_scylladb_internal_contains_key_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:journaling_scylladb_internal_find_keys_by_prefix_latency:rate1m
      expr: sum(rate(linera_journaling_scylladb_internal_find_keys_by_prefix_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:journaling_scylladb_internal_write_batch_size:rate1m
      expr: sum(rate(linera_journaling_scylladb_internal_write_batch_size_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:journaling_scylladb_internal_read_value_key_size:rate1m
      expr: sum(rate(linera_journaling_scylladb_internal_read_value_key_size_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:journaling_scylladb_internal_read_value_value_size:rate1m
      expr: sum(rate(linera_journaling_scylladb_internal_read_value_value_size_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:journaling_scylladb_internal_contains_keys_latency:rate1m
      expr: sum(rate(linera_journaling_scylladb_internal_contains_keys_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:journaling_scylladb_internal_read_multi_value_bytes_latency:rate1m
      expr: sum(rate(linera_journaling_scylladb_internal_read_multi_value_bytes_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:journaling_scylladb_internal_read_multi_values_num_entries:rate1m
      expr: sum(rate(linera_journaling_scylladb_internal_read_multi_values_num_entries_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:journaling_scylladb_internal_find_key_values_by_prefix_latency:rate1m
      expr: sum(rate(linera_journaling_scylladb_internal_find_key_values_by_prefix_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:journaling_scylladb_internal_find_keys_by_prefix_keys_size:rate1m
      expr: sum(rate(linera_journaling_scylladb_internal_find_keys_by_prefix_keys_size_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:journaling_scylladb_internal_find_keys_by_prefix_num_keys:rate1m
      expr: sum(rate(linera_journaling_scylladb_internal_find_keys_by_prefix_num_keys_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    # RocksDB internal (no job filter — dashboard uses $job variable)
    - record: linera:rocksdb_internal_write_batch_latency:rate1m
      expr: sum(rate(linera_rocksdb_internal_write_batch_latency_bucket[1m])) by (le, job)
    - record: linera:rocksdb_internal_read_value_bytes_latency:rate1m
      expr: sum(rate(linera_rocksdb_internal_read_value_bytes_latency_bucket[1m])) by (le, job)
    - record: linera:rocksdb_internal_contains_key_latency:rate1m
      expr: sum(rate(linera_rocksdb_internal_contains_key_latency_bucket[1m])) by (le, job)
    - record: linera:rocksdb_internal_find_keys_by_prefix_latency:rate1m
      expr: sum(rate(linera_rocksdb_internal_find_keys_by_prefix_latency_bucket[1m])) by (le, job)
    - record: linera:rocksdb_internal_write_batch_size:rate1m
      expr: sum(rate(linera_rocksdb_internal_write_batch_size_bucket[1m])) by (le, job)
    - record: linera:rocksdb_internal_read_value_key_size:rate1m
      expr: sum(rate(linera_rocksdb_internal_read_value_key_size_bucket[1m])) by (le, job)
    - record: linera:rocksdb_internal_read_value_value_size:rate1m
      expr: sum(rate(linera_rocksdb_internal_read_value_value_size_bucket[1m])) by (le, job)
    - record: linera:rocksdb_internal_contains_keys_latency:rate1m
      expr: sum(rate(linera_rocksdb_internal_contains_keys_latency_bucket[1m])) by (le, job)
    - record: linera:rocksdb_internal_read_multi_value_bytes_latency:rate1m
      expr: sum(rate(linera_rocksdb_internal_read_multi_value_bytes_latency_bucket[1m])) by (le, job)
    - record: linera:rocksdb_internal_read_multi_values_num_entries:rate1m
      expr: sum(rate(linera_rocksdb_internal_read_multi_values_num_entries_bucket[1m])) by (le, job)
    - record: linera:rocksdb_internal_find_key_values_by_prefix_latency:rate1m
      expr: sum(rate(linera_rocksdb_internal_find_key_values_by_prefix_latency_bucket[1m])) by (le, job)
    - record: linera:rocksdb_internal_find_keys_by_prefix_keys_size:rate1m
      expr: sum(rate(linera_rocksdb_internal_find_keys_by_prefix_keys_size_bucket[1m])) by (le, job)
    - record: linera:rocksdb_internal_find_keys_by_prefix_num_keys:rate1m
      expr: sum(rate(linera_rocksdb_internal_find_keys_by_prefix_num_keys_bucket[1m])) by (le, job)

  - name: linera.view.rules
    rules:
    - record: linera:load_view_latency:rate1m
      expr: sum(rate(linera_load_view_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator)
    - record: linera:save_view_latency:rate1m
      expr: sum(rate(linera_save_view_latency_bucket{job=~"linera-linera-server|linera-linera-proxy"}[1m])) by (le, validator, type)
