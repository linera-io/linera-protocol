[package]
name = "linera-bridge-e2e"
version = "0.0.1"
edition = "2021"
rust-version = "1.88"
publish = false

# Separate workspace — avoids bollard version conflicts between
# testcontainers (>=0.19) and dockertest (0.17) in the main workspace.

[workspace]

[dependencies]
alloy = { version = "=1.0.42", default-features = false, features = [
    "rpc-types-eth",
    "json-rpc",
    "contract",
    "reqwest",
    "signer-local",
] }
anyhow = "1"
bcs = "0.1.6"
futures = "0.3"
linera-base = { path = "../../../linera-base" }
linera-bridge = { path = "../../../linera-bridge", features = ["relay"] }
linera-client = { path = "../../../linera-client", default-features = false, features = [
    "wasmer",
] }
linera-core = { path = "../../../linera-core", default-features = false, features = [
    "wasmer",
] }
linera-execution = { path = "../../../linera-execution" }
linera-faucet-client = { path = "../../../linera-faucet/client" }
linera-persistent = { path = "../../../linera-persistent", features = ["fs"] }
linera-storage = { path = "../../../linera-storage", features = ["wasmer"] }
linera-storage-runtime = { path = "../../../linera-storage-runtime" }
linera-views = { path = "../../../linera-views" }
linera-wallet-json = { path = "../../../linera-wallet-json" }
rand = { version = "0.8", default-features = false, features = ["std_rng"] }
reqwest = { version = "0.12", default-features = false, features = [
    "json",
    "rustls-tls",
] }
rustls = { version = "0.23", default-features = false, features = ["ring"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
testcontainers = { version = "0.27", features = ["docker-compose"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt"] }
wrapped-fungible = { path = "../../../examples/wrapped-fungible" }
