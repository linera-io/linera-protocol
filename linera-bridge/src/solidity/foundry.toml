[profile.default]
src = "."
out = "out"
libs = ["lib"]
script = "script"
test = "test"
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 1
via_ir = true
evm_version = "shanghai"
fs_permissions = [
    { access = "read", path = "./test/fixtures" },
    { access = "read", path = "./broadcast" },
    # Runtime path used by the docker bridge-init container; the host
    # bind-mounts the shared volume under this path inside the container.
    { access = "read", path = "/shared" },
]
