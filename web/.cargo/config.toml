[env]
RUST_TARGET_PATH = { value = "../linera-service", relative = true }

[build]
target = "wasm32-web-unknown"
# -Zunstable-options is required for rustc to accept the custom target spec.
rustflags = ["-Zunstable-options", "--cfg=web_sys_unstable_apis"]

[unstable]
build-std = ["panic_abort", "std"]
json-target-spec = true
